<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AulaTalent ATS | Simulador educativo</title>
  <style>
    :root {
      --bg: #eef2f7;
      --panel: #fff;
      --ink: #172033;
      --muted: #667085;
      --line: #d9e0eb;
      --nav: #162033;
      --nav2: #22314f;
      --blue: #2563eb;
      --cyan: #0e7490;
      --green: #15803d;
      --amber: #b45309;
      --red: #b91c1c;
      --purple: #6d28d9;
      --shadow: 0 14px 34px rgba(24, 34, 54, .10);
      font-family: Inter, "Segoe UI", Roboto, Arial, sans-serif;
    }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; color: var(--ink); background: var(--bg); }
    button, input, select, textarea { font: inherit; }
    button { cursor: pointer; }
    .app { min-height: 100vh; display: grid; grid-template-columns: 270px minmax(0, 1fr); }
    aside { background: var(--nav); color: #fff; padding: 18px 14px; position: sticky; top: 0; height: 100vh; overflow: auto; }
    .brand { display: flex; gap: 11px; align-items: center; padding: 8px 10px 18px; border-bottom: 1px solid rgba(255,255,255,.12); margin-bottom: 14px; }
    .logo { width: 38px; height: 38px; border-radius: 9px; display: grid; place-items: center; background: #67e8f9; color: #0f2638; font-weight: 900; }
    .brand b { display: block; font-size: 16px; }
    .brand span, .nav-note { color: #bdc8da; font-size: 12px; }
    .role-box { background: var(--nav2); border: 1px solid rgba(255,255,255,.13); border-radius: 8px; padding: 10px; margin-bottom: 14px; }
    .role-box label { display: block; color: #d6dfed; font-size: 12px; margin-bottom: 6px; }
    .role-box select { width: 100%; border: 0; border-radius: 7px; padding: 10px; background: #fff; color: var(--ink); }
    nav { display: grid; gap: 4px; }
    nav button { border: 0; border-radius: 7px; padding: 10px; display: flex; gap: 10px; align-items: center; color: #dbe7f7; background: transparent; text-align: left; }
    nav button.active, nav button:hover { background: rgba(255,255,255,.13); color: #fff; }
    main { padding: 22px; min-width: 0; }
    .topbar { display: flex; gap: 16px; justify-content: space-between; align-items: flex-start; margin-bottom: 18px; }
    h1 { margin: 0; font-size: 26px; line-height: 1.15; letter-spacing: 0; }
    h2, h3 { letter-spacing: 0; }
    .subtitle { margin-top: 5px; color: var(--muted); font-size: 14px; max-width: 850px; }
    .actions, .filters { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .actions { justify-content: flex-end; }
    .btn { border: 1px solid var(--line); background: #fff; color: var(--ink); border-radius: 7px; padding: 9px 12px; min-height: 38px; display: inline-flex; align-items: center; justify-content: center; gap: 7px; }
    .btn.primary { color: #fff; background: var(--blue); border-color: var(--blue); }
    .btn.danger { color: var(--red); background: #fff5f5; border-color: #fecaca; }
    .btn.small { min-height: 30px; padding: 6px 9px; font-size: 12px; }
    .btn:disabled { opacity: .45; cursor: not-allowed; }
    .view { display: none; }
    .view.active { display: block; }
    .grid { display: grid; gap: 14px; }
    .stats { grid-template-columns: repeat(4, minmax(160px, 1fr)); }
    .two { grid-template-columns: minmax(0, 1.1fr) minmax(320px, .8fr); }
    .three { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .card { background: var(--panel); border: 1px solid var(--line); border-radius: 8px; box-shadow: var(--shadow); min-width: 0; }
    .card.pad { padding: 16px; }
    .card h2 { font-size: 18px; margin: 0 0 10px; }
    .card h3 { font-size: 15px; margin: 0 0 9px; }
    .small { color: var(--muted); font-size: 13px; }
    .metric span { color: var(--muted); font-size: 13px; }
    .metric strong { display: block; font-size: 28px; margin-top: 3px; }
    .hint { border-left: 4px solid var(--blue); background: #eff6ff; padding: 11px 12px; border-radius: 7px; color: #1e3a8a; font-size: 13px; }
    .warning { border-left-color: var(--amber); background: #fffbeb; color: #78350f; }
    .pill { display: inline-flex; align-items: center; gap: 5px; border-radius: 999px; padding: 4px 8px; background: #eef2ff; color: #3730a3; font-size: 12px; white-space: nowrap; }
    .pill.green { background: #dcfce7; color: var(--green); }
    .pill.amber { background: #fef3c7; color: var(--amber); }
    .pill.red { background: #fee2e2; color: var(--red); }
    .pill.cyan { background: #cffafe; color: var(--cyan); }
    .pill.gray { background: #e5e7eb; color: #374151; }
    .pill.purple { background: #ede9fe; color: var(--purple); }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 11px 12px; border-bottom: 1px solid var(--line); text-align: left; vertical-align: top; font-size: 14px; }
    th { color: var(--muted); font-size: 12px; background: #f8fafc; }
    input, select, textarea { border: 1px solid var(--line); border-radius: 7px; padding: 9px 10px; background: #fff; min-height: 38px; width: 100%; }
    textarea { min-height: 96px; resize: vertical; }
    .form { display: grid; gap: 10px; }
    .form.two-col { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .form label { display: grid; gap: 5px; color: var(--muted); font-size: 13px; }
    .form label span { color: var(--ink); font-weight: 650; }
    .task-list { display: grid; gap: 9px; }
    .task { display: grid; grid-template-columns: 30px minmax(0,1fr) auto; gap: 10px; align-items: center; padding: 10px; border: 1px solid var(--line); border-radius: 8px; background: #fff; }
    .task .num { width: 28px; height: 28px; display: grid; place-items: center; border-radius: 7px; background: #eaf1ff; color: var(--blue); font-weight: 800; font-size: 13px; }
    .task.done { border-color: #bbf7d0; background: #f0fdf4; }
    .progress { height: 9px; border-radius: 999px; background: #e7ecf4; overflow: hidden; }
    .progress span { display: block; height: 100%; background: var(--blue); }
    .bars { display: grid; gap: 10px; }
    .bar-row { display: grid; grid-template-columns: 145px minmax(0,1fr) 45px; gap: 10px; align-items: center; font-size: 13px; }
    .bar-track { height: 12px; border-radius: 999px; background: #e8edf5; overflow: hidden; }
    .bar-track span { display: block; height: 100%; background: var(--blue); }
    .kanban { display: grid; grid-template-columns: repeat(10, minmax(215px, 1fr)); gap: 12px; overflow-x: auto; padding-bottom: 7px; }
    .lane { background: #f8fafc; border: 1px solid var(--line); border-radius: 8px; min-height: 420px; display: flex; flex-direction: column; }
    .lane-head { padding: 11px; border-bottom: 1px solid var(--line); display: flex; justify-content: space-between; align-items: center; gap: 8px; position: sticky; top: 0; background: #f8fafc; border-radius: 8px 8px 0 0; z-index: 1; }
    .lane-body { padding: 10px; display: grid; gap: 9px; align-content: start; min-height: 350px; }
    .lane.drag-over { outline: 2px solid var(--blue); outline-offset: -4px; }
    .candidate-card { background: #fff; border: 1px solid var(--line); border-radius: 8px; padding: 11px; box-shadow: 0 5px 12px rgba(22,31,49,.06); }
    .candidate-card[draggable="true"] { cursor: grab; }
    .candidate-card strong { display: block; margin-bottom: 4px; }
    .meta { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
    .score { color: var(--blue); font-weight: 850; }
    .split { display: grid; grid-template-columns: minmax(0,1fr) 390px; gap: 14px; align-items: start; }
    .side { position: sticky; top: 18px; max-height: calc(100vh - 36px); overflow: auto; }
    .timeline { display: grid; gap: 10px; }
    .event { border-left: 3px solid var(--line); padding-left: 10px; font-size: 13px; }
    .event b { display: block; }
    .event span { color: var(--muted); }
    .matrix { min-width: 980px; }
    .matrix input, .matrix select { min-height: 32px; padding: 6px 7px; }
    .modal-backdrop { position: fixed; inset: 0; background: rgba(12,18,31,.58); display: none; align-items: center; justify-content: center; padding: 20px; z-index: 30; }
    .modal-backdrop.open { display: flex; }
    .modal { width: min(1040px, 100%); max-height: 91vh; overflow: auto; background: #fff; border-radius: 8px; box-shadow: 0 22px 70px rgba(0,0,0,.24); }
    .modal-head { padding: 16px; border-bottom: 1px solid var(--line); display: flex; justify-content: space-between; align-items: center; gap: 12px; }
    .modal-head h2 { margin: 0; font-size: 19px; }
    .modal-body { padding: 16px; }
    .toast { position: fixed; right: 18px; bottom: 18px; background: #111827; color: #fff; padding: 12px 14px; border-radius: 8px; box-shadow: var(--shadow); display: none; z-index: 40; max-width: 390px; }
    .toast.show { display: block; }
    .report-box { white-space: pre-wrap; background: #f8fafc; border: 1px solid var(--line); border-radius: 8px; padding: 14px; line-height: 1.45; }
    .hide { display: none !important; }
    @media (max-width: 1120px) {
      .app { grid-template-columns: 1fr; }
      aside { position: static; height: auto; }
      nav { grid-template-columns: repeat(2, minmax(0,1fr)); }
      .stats, .two, .three, .split { grid-template-columns: 1fr; }
      .side { position: static; max-height: none; }
    }
    @media (max-width: 680px) {
      main { padding: 14px; }
      .topbar { display: grid; }
      .actions, .filters { width: 100%; }
      .btn { width: 100%; }
      nav, .form.two-col { grid-template-columns: 1fr; }
      .stats { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

    function log(text, by){ return { text, by, at: new Date().toLocaleString("es-CL") }; }

    function load(){ try { return normalizeData(JSON.parse(localStorage.getItem("aulaTalentATS")) || structuredClone(seed)); } catch { return structuredClone(seed); } }
    function normalizeData(value){
      value.taskStatus = value.taskStatus || emptyTaskStatus();

      value.publications = value.publications || [];

    function save(){ localStorage.setItem("aulaTalentATS", JSON.stringify(data)); }

      return `<div class="toolbar filters" style="margin-bottom:14px"><label style="margin:0"><span>Proceso activo</span><select onchange="setActiveProcess(this.value)">${processOptions()}</select></label><span class="small">${help}</span></div>`;

    function escapeHtml(v){ return String(v ?? "").replace(/[&<>"']/g, m => ({ "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;" }[m])); }
    function requiredValues(ids, label){
      const missing = ids.filter(id => !String(val(id) ?? "").trim());
      if (missing.length) { toast(`Falta completar: ${label || missing[0]}`); return false; }
      return true;
    }
    function completeTask(id){
      const task = taskDefinitions.find(t => t.id === id);
      if (!task || data.taskStatus[id]?.done) return false;
      data.taskStatus[id] = { done:true, at:new Date().toLocaleString("es-CL") };
      data.audit.unshift(log(`Actividad completada: ${task.title}`, role()));
      save();
      setTimeout(() => toast(`Actividad completada: ${task.title}`), 40);
      return true;
    }
    function completeTaskAndRender(id){
      completeTask(id);
      render();
    }

    function exerciseProgress(){

    function saveRequisition(id=""){
      if (!requiredValues(["reqTitle","reqArea","reqManager","reqReason","reqVacancies","reqCity","reqSchedule","reqContract","reqSalary","reqStart","reqDescription","reqFunctions","mustCriteria","niceCriteria","competencyCriteria"], "todos los campos de la requisicion y criterios")) return;
      const item = { id:"r"+Date.now(), title:val("reqTitle"), area:val("reqArea"), manager:val("reqManager"), reason:val("reqReason"), vacancies:Number(val("reqVacancies")), mode:val("reqMode"), city:val("reqCity"), schedule:val("reqSchedule"), contract:val("reqContract"), salary:val("reqSalary"), startDate:val("reqStart"), urgency:val("reqUrgency"), status:val("reqStatus") };
      if (id) {
        const index = data.requisitions.findIndex(r => r.id === id);
        item.id = id;
        if (index >= 0) data.requisitions[index] = item;
      } else {
        data.requisitions.unshift(item);
      }
      let p = data.processes.find(proc => proc.requisition === item.id);
      if (!p) {
        p = { id:"p"+Date.now(), requisition:item.id, title:item.title, status:"Levantamiento de perfil", responsible:"Equipo de seleccion", sources:["Portal corporativo","LinkedIn","Laborum","Computrabajo","Referido","Carga manual"], description:"", functions:"", must:[], nice:[], competencies:[], questions:getProcess().questions || [] };
        data.processes.unshift(p);
      }
      data.activeProcess = p.id;
      p.title = item.title;
      p.description = val("reqDescription");
      p.functions = val("reqFunctions");
      p.must = linesFrom("mustCriteria");
      p.nice = linesFrom("niceCriteria");
      p.competencies = linesFrom("competencyCriteria");
      if (!p.must.length || !p.nice.length || !p.competencies.length) { toast("Cada bloque de criterios debe tener al menos un elemento."); return; }
      data.exerciseNotes.criteria = `Excluyentes: ${p.must.join("; ")}. Deseables: ${p.nice.join("; ")}. Competencias: ${p.competencies.join("; ")}.`;
      completeTask("t1");
      completeTask("t2");
      data.audit.unshift(log(`${id ? "Requisicion editada" : "Requisicion creada"}: ${val("reqTitle")}`, role()));
      save(); closeModal(); render(); toast("Requisicion y criterios guardados.");
    }

      if (!requiredValues(["intCand","intDate","intTime","intMode","intBy","intNotes"], "datos de entrevista y observaciones")) return;
      const id = "i"+Date.now(), cid = document.getElementById("intCand").value, c = getCandidate(cid), p = getProcess();
      const item = { id, candidate: cid, date: val("intDate"), time: val("intTime"), mode: val("intMode"), interviewer: val("intBy"), notes: val("intNotes"), message: fillTemplate(templates.interview, c, {fecha:val("intDate"), hora:val("intTime"), modalidad:val("intMode"), entrevistador:val("intBy")}) };
      data.interviews.unshift(item); c.stage = "Entrevista agendada"; completeTask("t7"); data.audit.unshift(log(`Entrevista agendada para ${c.name}`, role())); save(); render(); toast("Entrevista agendada y etapa actualizada.");
    }
    function openInterview(id){ const i = data.interviews.find(x=>x.id===id); openModal("Invitacion a entrevista", `<textarea style="min-height:260px">${escapeHtml(i.message)}</textarea>`); }

    function renderScorecards(){
      const eligible = candidatesForActive().filter(c=>c.humanDecision!=="Descartar");
      const rows = Object.entries(data.scorecards).filter(([id]) => candidateInActive(id));
      document.getElementById("scorecards").innerHTML = `
        ${processToolbar("Las scorecards se guardan contra candidatos del proceso activo.")}
        <div class="toolbar filters" style="margin-bottom:14px">${eligible.length ? `<select id="scoreCand">${eligible.map(c=>`<option value="${c.id}">${c.name}</option>`).join("")}</select><button class="btn primary" onclick="openScorecard(document.getElementById('scoreCand').value)">Completar scorecard</button>` : `<span class="small">No hay candidatos disponibles para evaluar.</span>`}</div>
        <div class="card"><table><thead><tr><th>Candidato</th><th>Promedio</th><th>Recomendacion</th><th>Comentario</th><th></th></tr></thead><tbody>${rows.length ? rows.map(([id,sc])=>`<tr><td>${getCandidate(id)?.name}</td><td><b>${avg(sc)}/5</b></td><td>${sc.recommendation}</td><td>${escapeHtml(sc.comment)}</td><td><button class="btn small" onclick="openScorecard('${id}')">Editar</button></td></tr>`).join("") : `<tr><td colspan="5"><span class="small">Sin scorecards registradas para este proceso.</span></td></tr>`}</tbody></table></div>`;
    }
    function openScorecard(id){
      const c = getCandidate(id), sc = data.scorecards[id] || {comunicacion:3,experiencia:3,motivacion:3,dificil:3,orden:3,condiciones:3,comment:"",recommendation:"Revisar",date:new Date().toISOString().slice(0,10),validate:""};
      data.scorecards[id] = sc;
      openModal(`Scorecard: ${c.name}`, `<div class="form two-col">
        ${scoreInput("comunicacion","Comunicacion",sc.comunicacion)}${scoreInput("experiencia","Experiencia relevante",sc.experiencia)}
        ${scoreInput("motivacion","Motivacion por el cargo",sc.motivacion)}${scoreInput("dificil","Manejo de situaciones dificiles",sc.dificil)}
        ${scoreInput("orden","Orden y seguimiento",sc.orden)}${scoreInput("condiciones","Ajuste a condiciones",sc.condiciones)}
        <label><span>Fecha</span><input id="sc_date" type="date" value="${sc.date}"></label>
        <label><span>Recomendacion</span><select id="sc_recommendation"><option>Avanzar</option><option>Revisar</option><option>Descartar</option></select></label>
        <label style="grid-column:1/-1"><span>Comentario del entrevistador</span><textarea id="sc_comment">${escapeHtml(sc.comment)}</textarea></label>
        <label style="grid-column:1/-1"><span>Punto a validar</span><input id="sc_validate" value="${escapeHtml(sc.validate)}"></label>
        <button class="btn primary" onclick="saveScorecard('${id}')">Guardar scorecard</button>
      </div>`);
      document.getElementById("sc_recommendation").value = sc.recommendation;
    }
    function scoreInput(id,label,value){ return `<label><span>${label}</span><input id="sc_${id}" type="number" min="1" max="5" value="${value}"></label>`; }
    function saveScorecard(id){
      const keys = ["comunicacion","experiencia","motivacion","dificil","orden","condiciones"];
      const sc = {}; keys.forEach(k => sc[k] = Number(val("sc_"+k)));
      if (!requiredValues(["sc_comment","sc_validate"], "comentario del entrevistador y punto a validar")) return;
      sc.comment = val("sc_comment"); sc.recommendation = val("sc_recommendation"); sc.date = val("sc_date"); sc.validate = val("sc_validate");
      data.scorecards[id] = sc; getCandidate(id).stage = sc.recommendation === "Avanzar" ? "Finalista" : getCandidate(id).stage;
      completeTask("t8");
      checkFinalists();
      data.audit.unshift(log(`Scorecard completada para ${getCandidate(id).name}`, role())); save(); closeModal(); render(); toast("Scorecard guardada.");
    }
    function avg(sc){ return (["comunicacion","experiencia","motivacion","dificil","orden","condiciones"].reduce((s,k)=>s+Number(sc[k]||0),0)/6).toFixed(1); }

    function renderCommunications(){
      const activeIds = new Set(candidatesForActive().map(c => c.id));
      const communications = data.communications.filter(m => !m.candidateIds || m.candidateIds.some(id => activeIds.has(id)));
      document.getElementById("communications").innerHTML = `
        ${processToolbar("Los mensajes y destinatarios se limitan a esta requisicion.")}
        <div class="grid two">
          <div class="card pad"><h2>Generar comunicacion simulada</h2>
            <div class="form">
              <label><span>Tipo de comunicacion</span><select id="msgType" onchange="renderMessageTargets()"><option value="reject">Mensaje de descarte</option><option value="received">Confirmacion de postulacion</option><option value="interview">Invitacion a entrevista</option><option value="advance">Avance a siguiente etapa</option><option value="offer">Oferta</option></select></label>
              <div id="msgTargets"></div>
              <label><span>Mensaje a registrar</span><textarea id="msgBody" style="min-height:230px" placeholder="Redacta el mensaje que recibira el candidato. Debe ser claro, respetuoso y consistente con su etapa."></textarea></label>
              <div class="actions"><button class="btn" onclick="loadSuggestedTemplate()">Usar plantilla sugerida</button><button class="btn primary" onclick="saveMessage()">Registrar en historial</button></div>
            </div>
          </div>
          <div class="card pad"><h2>Mensajes registrados</h2><div class="timeline">${communications.map(m=>`<div class="event"><b>${m.title}</b><span>${m.to} · ${m.at}</span><p>${escapeHtml(m.body).slice(0,170)}...</p></div>`).join("") || "<p class='small'>Aun no hay mensajes generados para este proceso.</p>"}</div></div>
        </div>`;
      renderMessageTargets();
    }
    function fillTemplate(t,c,extra={}){ return t.replaceAll("[Nombre]", c.name).replaceAll("[Cargo]", getProcess().title).replaceAll("[fecha]", extra.fecha || "por definir").replaceAll("[hora]", extra.hora || "por definir").replaceAll("[modalidad]", extra.modalidad || "por definir").replaceAll("[entrevistador]", extra.entrevistador || "Equipo de seleccion"); }
    function renderMessageTargets(){
      const type = val("msgType");
      const target = document.getElementById("msgTargets");
      if (!target) return;
      if (type === "reject") {
        const discarded = candidatesForActive().filter(c => c.stage === "Descartado");
        target.innerHTML = `<label><span>Candidatos descartados</span><div class="card pad" style="box-shadow:none">${discarded.length ? discarded.map(c=>`<label style="display:flex;gap:8px;align-items:center;margin:6px 0"><input type="checkbox" class="msgCandidate" value="${c.id}" style="width:auto;min-height:auto"> ${escapeHtml(c.name)} <span class="small">${escapeHtml(c.discardReason || "sin motivo registrado")}</span></label>`).join("") : `<span class="small">No hay candidatos en etapa Descartado. Mueve candidatos a Descartado antes de registrar un cierre.</span>`}</div></label>`;
      } else {
        target.innerHTML = `<label><span>Candidato</span><select id="msgCand">${candidatesForActive().map(c=>`<option value="${c.id}">${escapeHtml(c.name)} - ${escapeHtml(c.stage)}</option>`).join("")}</select></label>`;
      }
    }
    function selectedMessageCandidates(){
      const type = val("msgType");
      if (type === "reject") return [...document.querySelectorAll(".msgCandidate:checked")].map(x => getCandidate(x.value)).filter(Boolean);
      const id = document.getElementById("msgCand")?.value;
      return id ? [getCandidate(id)].filter(Boolean) : [];
    }
    function loadSuggestedTemplate(){
      const selected = selectedMessageCandidates();
      if (!selected.length) return toast("Selecciona al menos un destinatario antes de cargar una plantilla.");
      document.getElementById("msgBody").value = fillTemplate(templates[val("msgType")], selected[0]);
    }
    function saveMessage(){
      const type = val("msgType"), body = val("msgBody").trim(), selected = selectedMessageCandidates();
      if (!selected.length) return toast(type === "reject" ? "Selecciona al menos un candidato descartado." : "Selecciona un candidato.");
      if (type === "reject" && selected.some(c => c.stage !== "Descartado")) return toast("El mensaje de descarte solo puede registrarse para candidatos en etapa Descartado.");
      if (body.length < 80) return toast("Redacta un mensaje mas completo antes de registrarlo.");
      data.communications.unshift({title:type,to:selected.map(c=>c.name).join(", "),candidateIds:selected.map(c=>c.id),process:data.activeProcess,body,at:new Date().toLocaleString("es-CL")});
      if (type === "reject") completeTask("t9");
      data.audit.unshift(log(`Comunicacion registrada para ${selected.map(c=>c.name).join(", ")}`, role()));
      save(); renderCommunications(); toast("Mensaje registrado.");
    }

    function renderReports(){
      const finalists = shortlist();
      document.getElementById("reports").innerHTML = `
        ${processToolbar("El reporte ejecutivo resume solo candidatos, entrevistas y evaluaciones de este proceso.")}
        <div class="grid two">
          <div class="card pad"><h2>Finalistas en pipeline</h2>${finalists.length ? finalists.map((c,i)=>`<div class="event"><b>${i+1}. ${c.name}</b><span>${c.score}% ATS · Decision: ${c.humanDecision}</span><p>${escapeHtml(c.humanReason)}</p><button class="btn small" onclick="openCandidate('${c.id}')">Ver evidencia</button></div>`).join("") : `<p class="small">Aun no hay candidatos en etapa Finalista. Mueve candidatos desde el Kanban para construir la terna.</p>`}${finalists.length < 3 ? `<div class="hint warning" style="margin-top:12px">Faltan ${3-finalists.length} finalista(s) para completar una terna. Vuelve al pipeline y mueve candidatos a Finalista cuando tengas evidencia suficiente.</div>` : `<div class="hint" style="margin-top:12px">Terna formada desde la etapa Finalista del pipeline.</div>`}</div>
          <div class="card pad"><h2>Reporte ejecutivo</h2><div class="actions" style="margin-bottom:10px"><button class="btn primary" onclick="generateReport()">Generar reporte</button><button class="btn" onclick="copyReport()">Copiar reporte</button></div><div id="reportText" class="report-box">${escapeHtml(buildReport())}</div></div>
        </div>`;
    }
    function shortlist(){
      return candidatesForActive().filter(c => c.stage === "Finalista").sort((a,b)=> {
        const as = Number(data.scorecards[a.id] ? avg(data.scorecards[a.id]) : 0), bs = Number(data.scorecards[b.id] ? avg(data.scorecards[b.id]) : 0);
        return (bs*20 + matrixTotal(b)) - (as*20 + matrixTotal(a));
      }).slice(0,3);
    }
    function buildReport(){
      const p = getProcess(), terna = shortlist(), current = candidatesForActive(), currentIds = new Set(current.map(c => c.id));
      return `Proceso: ${p.title}
Estado actual: ${p.status}
Postulantes recibidos: ${current.length}
Candidatos revisados: ${current.filter(c=>c.stage!=="Nuevo").length}
Candidatos preseleccionados: ${current.filter(c=>["Preseleccionado","Entrevista agendada","Entrevistado","Finalista","Oferta","Contratado"].includes(c.stage)).length}
Candidatos entrevistados: ${Object.keys(data.scorecards).filter(id => currentIds.has(id)).length}

Finalistas:
${terna.length ? terna.map((c,i)=>`${i+1}. ${c.name} - ${c.humanReason} Punto a validar: ${(data.scorecards[c.id]?.validate || "condiciones y evidencia en entrevista final")}.`).join(`
`) : "Aun no hay finalistas definidos en el pipeline."}

Resumen ejecutivo:
Se revisaron las candidaturas considerando requisitos excluyentes, experiencia relevante, manejo de herramientas, respuestas de postulacion, matriz curricular, score ATS simulado y revision humana.

Riesgos o puntos a validar:
- El score automatico puede sobrevalorar palabras clave sin evidencia.
- La disponibilidad presencial y renta deben confirmarse antes de oferta.
- Candidatos con trayectoria no tradicional deben revisarse sin sesgos.
- Descartes deben tener motivo trazable y comunicacion respetuosa.

Proximos pasos:
Coordinar entrevistas finales con jefatura, completar pauta de evaluacion y registrar decision final.`;
    }
    function generateReport(){ completeTask("t12"); data.audit.unshift(log("Reporte ejecutivo generado", role())); save(); document.getElementById("reportText").textContent = buildReport(); toast("Reporte generado y registrado en trazabilidad."); }
    async function copyReport(){ try { await navigator.clipboard.writeText(buildReport()); toast("Reporte copiado al portapapeles."); } catch { toast("No se pudo copiar automaticamente. Puedes seleccionarlo manualmente."); } }

    function renderSettings(){
      document.getElementById("settings").innerHTML = `
        <div class="grid two">
          <div class="card pad"><h2>Roles y permisos</h2><table><tbody>
            <tr><td>Administrador</td><td>Configura y reinicia la demo.</td></tr><tr><td>Reclutador</td><td>Mueve candidatos, revisa fichas y agenda entrevistas.</td></tr>
            <tr><td>Jefatura solicitante</td><td>Revisa terna, criterios y scorecards.</td></tr><tr><td>Entrevistador</td><td>Completa pauta y evidencia.</td></tr>
            <tr><td>Candidato</td><td>Usa portal y visualiza experiencia de postulacion.</td></tr><tr><td>Observador docente</td><td>Analiza trazabilidad y sesgos.</td></tr>
          </tbody></table></div>
          <div class="card pad"><h2>Trazabilidad</h2><div class="timeline">${data.audit.map(a=>`<div class="event"><b>${escapeHtml(a.text)}</b><span>${escapeHtml(a.by)} · ${escapeHtml(a.at)}</span></div>`).join("")}</div></div>
        </div>
        <div class="card pad" style="margin-top:14px"><h2>Privacidad y limites</h2><p>Todos los datos son ficticios. La maqueta usa localStorage, no envia correos reales y no debe contener datos personales reales. Su objetivo es simular un flujo de seleccion con criterios, evidencia, trazabilidad y responsabilidad humana.</p><button class="btn danger" onclick="resetDemo()">Reiniciar demo</button></div>`;
    }

    function openCandidate(id){
      const c = getCandidate(id);
      openModal(`Ficha: ${c.name}`, `<div class="split">
        <div class="grid">
          <div class="card pad"><h2>${c.name}</h2><p>${c.email} · ${c.phone} · ${c.city}</p><p><b>Fuente:</b> ${c.source} · <b>Etapa:</b> ${c.stage} · <b>Renta:</b> ${money(c.salary)}</p><p>${c.tags.map(t=>pill(t)).join(" ")} ${c.risks.map(r=>pill(r,"red")).join(" ")}</p></div>
          <div class="card pad"><h3>CV y resumen extraido simulado</h3><p>${escapeHtml(c.cv)}</p><h3>Respuestas de postulacion</h3><table><tbody>${Object.entries(c.answers).map(([k,v])=>`<tr><td>${k}</td><td>${escapeHtml(v)}</td></tr>`).join("")}</tbody></table></div>
          <div class="card pad"><h3>Notas internas y descarte</h3><div class="form"><label><span>Notas internas</span><textarea id="candNotes">${escapeHtml(c.notes)}</textarea></label><label><span>Motivo de descarte</span><input id="discardReason" value="${escapeHtml(c.discardReason)}"></label><label><span>Decision humana</span><select id="humanDecision"><option>Avanzar</option><option>Revisar</option><option>Descartar</option></select></label><label><span>Motivo final</span><textarea id="humanReason">${escapeHtml(c.humanReason)}</textarea></label><button class="btn primary" onclick="saveCandidate('${c.id}')">Guardar ficha</button></div></div>
        </div>
        <div class="card pad side"><h3>Score y movimiento</h3><p><span class="score">${c.score}% ATS</span></p><p>${recommendationPill(c)} <span class="small">segun matriz</span></p><label class="small">Cambiar etapa</label><select id="moveStage">${stages.map(s=>`<option ${s===c.stage?"selected":""}>${s}</option>`).join("")}</select><button class="btn primary" style="width:100%; margin-top:8px" onclick="moveFromFicha('${c.id}')" ${canEdit()?"":"disabled"}>Actualizar etapa</button><hr style="border:0;border-top:1px solid var(--line);margin:14px 0"><h3>Historial reciente</h3><div class="timeline">${data.audit.slice(0,8).map(a=>`<div class="event"><b>${escapeHtml(a.text)}</b><span>${escapeHtml(a.by)} · ${escapeHtml(a.at)}</span></div>`).join("")}</div></div>
      </div>`);
      document.getElementById("humanDecision").value = c.humanDecision;
    }
    function saveCandidate(id){
      const c = getCandidate(id); c.notes = val("candNotes"); c.discardReason = val("discardReason"); c.humanDecision = val("humanDecision"); c.humanReason = val("humanReason");
      completeTask("t4");
      data.audit.unshift(log(`Ficha actualizada para ${c.name}`, role())); save(); closeModal(); render(); toast("Ficha actualizada.");
    }
    function moveFromFicha(id){ moveCandidate(id, val("moveStage")); closeModal(); }
    function openVacancy(){ const p = getProcess(); openModal("Oferta simulada", `<div class="card pad"><h2>${p.title}</h2><p>${p.description}</p>${listBlock("Requisitos excluyentes",p.must,"red")}${listBlock("Deseables",p.nice,"amber")}<button class="btn primary" onclick="openPortal()">Postular</button></div>`); }
    function openPortal(){
      if (!data.requisitions.length) { toast("Primero crea una requisicion para asociar postulaciones al proceso."); return; }
      if (!hasActivePublication()) { toast("Primero publica la oferta en el modulo Publicacion."); return; }
      const p = getProcess();
      openModal("Portal candidato", `<div class="grid two">
        <div class="card pad"><h2>${p.title}</h2><p>${p.description}</p><div class="hint">Formulario simulado para crear una postulacion asociada al proceso activo.</div></div>
        <div class="card pad"><h2>Formulario</h2><div class="form">
          <label><span>Nombre ficticio</span><input id="newName" placeholder="Nombre y apellido"></label>
          <label><span>Correo ficticio</span><input id="newEmail" placeholder="correo@demo.cl"></label>
          <label><span>Telefono ficticio</span><input id="newPhone" placeholder="+56 9 ...."></label>
          <label><span>Fuente</span><select id="newSource">${p.sources.map(s=>`<option>${s}</option>`).join("")}</select></label>
          <label><span>Ciudad</span><input id="newCity" placeholder="Ciudad de residencia"></label>
          <label><span>Anos experiencia</span><input id="newExp" type="number" min="0" step="0.5" placeholder="0"></label>
          <label><span>Pretension renta liquida</span><input id="newSalary" type="number" min="0" placeholder="Monto en CLP"></label>
          <label><span>Disponibilidad presencial Valparaiso</span><select id="newPres"><option>Si</option><option>No</option></select></label>
          <label><span>Gestion de reclamos o casos dificiles</span><textarea id="newClaims" placeholder="Describe evidencia concreta."></textarea></label>
          <label><span>CRM, ERP o sistema de registro usado</span><input id="newSystem" placeholder="Nombre del sistema o 'sin experiencia'"></label>
          <label><span>Experiencia atendiendo a un usuario dificil</span><textarea id="newCase" placeholder="Describe situacion, accion y resultado."></textarea></label>
          <label><span>Resumen curricular / CV simulado</span><textarea id="newCv" placeholder="Trayectoria, funciones, herramientas y logros relevantes."></textarea></label>
          <label><input id="newConsent" type="checkbox" checked> Acepto consentimiento ficticio de tratamiento de datos.</label>
          <button class="btn primary" onclick="submitApplication()">Enviar postulacion ficticia</button>
        </div></div></div>`);
    }
    function submitApplication(){
      if (!document.getElementById("newConsent").checked) return toast("El consentimiento ficticio es obligatorio para la demo.");
      if (!requiredValues(["newName","newEmail","newPhone","newCity","newExp","newSalary","newClaims","newSystem","newCase","newCv"], "todos los campos de postulacion")) return;
      const id = "c"+Date.now(), exp = Number(val("newExp")), pres = val("newPres")==="Si", score = Math.max(25, Math.min(94, 45 + exp*8 + (pres?12:-18)));
      const c = { id, name:val("newName"), email:val("newEmail"), phone:val("newPhone"), source:val("newSource"), stage:pres?"Nuevo":"Descartado", score, exp, city:val("newCity"), salary:Number(val("newSalary")), tags:["creado en clase"], risks:pres?[]:["no cumple presencialidad"], summary:val("newCv"), process:"p1", applied:new Date().toISOString().slice(0,10), cv:val("newCv"), answers:{presencial:val("newPres"),exp:String(exp),reclamos:val("newClaims"),sistema:val("newSystem"),caso:val("newCase")}, matrix:{presencial:pres?1:0,expMin:exp>=1?1:0,atencion:2,reclamos:val("newClaims").length>25?1:0,crm:val("newSystem").toLowerCase().includes("sin experiencia")?0:1,excel:0,claridad:val("newCv").length>80?2:1,renta:2}, humanDecision:pres?"Revisar":"Descartar", humanReason:pres?"Postulacion creada en el portal; revisar evidencia curricular y respuestas.":"No cumple presencialidad.", notes:"", discardReason:pres?"":"No cumple requisito excluyente", consent:true };
      data.candidates.unshift(c); completeTask("t3"); data.audit.unshift(log(`Postulacion ficticia creada: ${c.name}`, "Portal candidato")); save(); closeModal(); render(); toast("Postulacion ficticia creada.");
    }

    function openModal(title, body){ document.getElementById("modalTitle").textContent = title; document.getElementById("modalBody").innerHTML = body; document.getElementById("modalWrap").classList.add("open"); }
    function closeModal(){ document.getElementById("modalWrap").classList.remove("open"); }
    function val(id){ return document.getElementById(id).value; }
    function toast(msg){ const el = document.getElementById("toast"); el.textContent = msg; el.classList.add("show"); setTimeout(()=>el.classList.remove("show"), 2700); }

    document.getElementById("portalBtn").addEventListener("click", openPortal);
    document.getElementById("resetBtn").addEventListener("click", resetDemo);
    document.getElementById("blankBtn").addEventListener("click", resetBlank);
    document.getElementById("reportBtn").addEventListener("click", () => setView("reports"));
    document.getElementById("role").addEventListener("change", render);
    document.getElementById("modalWrap").addEventListener("click", e => { if (e.target.id === "modalWrap") closeModal(); });
    save(); render();
  </script>
</body>
